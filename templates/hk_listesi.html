{% extends "base.html" %}
{% set active = "hk-listesi" %}
{% block title %}HK Listesi{% endblock %}
{% block page_title %}🧹 Housekeeping Listesi{% endblock %}

{% block content %}

<div style="display:flex;align-items:center;gap:16px;margin-bottom:20px;flex-wrap:wrap">
  <div style="display:flex;align-items:center;gap:8px">
    <button class="btn" onclick="changeDate(-1)" style="padding:6px 12px;font-size:16px">‹</button>
    <input type="date" id="tarih-input" class="form-control"
      style="width:160px;font-size:14px;font-weight:600;text-align:center;cursor:pointer"
      onchange="loadData()"
      onclick="try{this.showPicker()}catch(e){}">
    <button class="btn" onclick="changeDate(1)" style="padding:6px 12px;font-size:16px">›</button>
    <button class="btn" onclick="goToday()" style="padding:6px 12px;font-size:13px">Bugün</button>
  </div>
  <div id="ozet-hk" style="font-size:13px;color:var(--text2)"></div>
  <button class="btn" onclick="loadData()" style="margin-left:auto;padding:6px 14px;font-size:13px">🔄 Yenile</button>
</div>

<div class="panel" style="padding:0;overflow:hidden">
  <table class="hk-table" id="tbl-hk">
    <thead>
      <tr>
        <th style="width:70px">Oda</th>
        <th style="width:60px">Otel</th>
        <th>Misafir</th>
        <th style="width:110px">Anahtar Saati</th>
        <th style="width:120px;text-align:center">Durum</th>
        <th style="width:90px;text-align:center">İşlem</th>
      </tr>
    </thead>
    <tbody id="hk-tbody">
      <tr><td colspan="6" style="text-align:center;padding:30px;color:var(--text2)"><span class="spinner"></span></td></tr>
    </tbody>
  </table>
</div>

<style>
.hk-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}
.hk-table thead tr { background: var(--bg); }
.hk-table th {
  padding: 10px 12px;
  text-align: left;
  font-size: 11px;
  color: var(--text2);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .5px;
  border-bottom: 1px solid var(--border);
}
.hk-table td {
  padding: 12px;
  border-bottom: 1px solid var(--border);
  color: var(--text);
  vertical-align: middle;
}
.hk-table tr:last-child td { border-bottom: none; }
.hk-table tr.row-bekliyor td { background: transparent; }
.hk-table tr.row-temizleniyor td { background: rgba(255,165,0,0.07); }
.hk-table tr.row-temiz td { background: rgba(46,213,115,0.07); }

.hk-badge {
  display: inline-block;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
}
.hk-badge.bekliyor     { background: rgba(200,200,200,0.15); color: var(--text2); }
.hk-badge.temizleniyor { background: rgba(255,165,0,0.2);    color: orange; }
.hk-badge.temiz        { background: rgba(46,213,115,0.2);   color: var(--accent2); }

.hk-btn {
  padding: 5px 10px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--card2);
  color: var(--text);
  font-size: 12px;
  cursor: pointer;
  white-space: nowrap;
}
.hk-btn:hover { background: var(--accent); color: #111; }
.hk-btn { transition: all .15s; }
.hk-btn.bekliyor     { border-color: var(--text2); color: var(--text2); }
.hk-btn.temizleniyor { border-color: orange; color: orange; }
.hk-btn.temiz        { border-color: var(--accent2); color: var(--accent2); }
.hk-btn.active-step  { font-weight: 700; opacity: 1; }
.hk-btn.done-step    { opacity: .35; cursor: default; pointer-events: none; }

.otel-leo { color: var(--accent);  font-weight:700; font-size:12px; }
.otel-cv  { color: var(--accent4); font-weight:700; font-size:12px; }

.empty-msg { padding:30px; text-align:center; color:var(--text2); font-size:14px; }
</style>

{% endblock %}

{% block scripts %}
<script>
const today = new Date().toISOString().split('T')[0];

function init() {
  document.getElementById('tarih-input').value = today;
  loadData();
  // Her 30 saniyede otomatik yenile
  setInterval(loadData, 30000);
}

function changeDate(delta) {
  const inp = document.getElementById('tarih-input');
  const parts = inp.value.split('-');
  const d = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
  d.setDate(d.getDate() + delta);
  inp.value = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  loadData();
}

function goToday() {
  document.getElementById('tarih-input').value = today;
  loadData();
}

async function loadData() {
  const tarih = document.getElementById('tarih-input').value;
  try {
    const res = await fetch(`/api/hk-listesi?tarih=${tarih}`);
    const d   = await res.json();
    renderTable(d.odalar);
    const bekliyor     = d.odalar.filter(o => o.hk_durum === 'bekliyor').length;
    const temizleniyor = d.odalar.filter(o => o.hk_durum === 'temizleniyor').length;
    const temiz        = d.odalar.filter(o => o.hk_durum === 'temiz').length;
    document.getElementById('ozet-hk').innerHTML =
      `Toplam: <strong>${d.odalar.length}</strong> oda &nbsp;|&nbsp;
       ⏳ Bekliyor: <strong>${bekliyor}</strong> &nbsp;|&nbsp;
       🔄 Temizleniyor: <strong>${temizleniyor}</strong> &nbsp;|&nbsp;
       ✅ Temiz: <strong>${temiz}</strong>`;
  } catch(e) {
    document.getElementById('hk-tbody').innerHTML =
      '<tr><td colspan="6" class="empty-msg">Veri yüklenemedi</td></tr>';
  }
}

function renderTable(odalar) {
  const tbody = document.getElementById('hk-tbody');
  if (!odalar.length) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty-msg">Bu tarih için anahtar teslim alınan oda yok</td></tr>';
    return;
  }
  tbody.innerHTML = odalar.map(o => {
    const otelCls = o.otel === 'LEO' ? 'otel-leo' : 'otel-cv';
    const saat    = o.teslim_zaman ? o.teslim_zaman.slice(11, 16) : '—';
    const durum   = o.hk_durum || 'bekliyor';

    let badgeTxt = durum === 'temiz' ? '✅ Temiz' :
                   durum === 'temizleniyor' ? '🔄 Temizleniyor' : '⏳ Bekliyor';

    // 3 adım sıralı: Bekliyor → Temizleniyor → Temiz
    const adimlar = [
      { key: 'bekliyor',     label: '⏳ Bekliyor',      next: 'temizleniyor' },
      { key: 'temizleniyor', label: '🔄 Temizleniyor',  next: 'temiz'        },
      { key: 'temiz',        label: '✅ Temiz',          next: null           },
    ];
    const aktifIdx = adimlar.findIndex(a => a.key === durum);
    const butonlar = adimlar.map((a, i) => {
      if (i < aktifIdx) {
        // Tamamlandı — soluk, tıklanamaz
        return `<button class="hk-btn ${a.key} done-step">${a.label}</button>`;
      } else if (i === aktifIdx) {
        // Mevcut adım — aktif, tıklanınca sonrakine geç
        const onclick = a.next ? `onclick="setDurum(${o.foy_no},'${a.next}')"` : '';
        return `<button class="hk-btn ${a.key} active-step" ${onclick}>${a.label}</button>`;
      } else {
        // Henüz gelmedi — soluk, tıklanamaz
        return `<button class="hk-btn ${a.key} done-step" style="opacity:.2">${a.label}</button>`;
      }
    }).join(' ');

    const bakiyeUyari = o.bakiyeli
      ? `<span title="Bakiyeli çıkış!" style="color:#ff6b6b;font-size:11px;margin-left:4px">⚠️ BAKİYE</span>`
      : '';

    return `<tr class="row-${durum}">
      <td><strong style="font-size:16px">${o.oda_no}</strong></td>
      <td class="${otelCls}">${o.otel}</td>
      <td>${o.musteri}${bakiyeUyari}</td>
      <td style="font-family:monospace;font-size:13px">${saat}</td>
      <td style="text-align:center"><span class="hk-badge ${durum}">${badgeTxt}</span></td>
      <td style="text-align:center">${butonlar}</td>
    </tr>`;
  }).join('');
}

async function setDurum(foyNo, durum) {
  try {
    const res = await fetch('/api/hk-durum', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({foy_no: foyNo, durum: durum})
    });
    const d = await res.json();
    if (d.ok) {
      toast(durum === 'temiz' ? '✅ Oda temiz olarak işaretlendi' : '🔄 Temizlik başladı');
      loadData();
    }
  } catch(e) { toast('Hata', 'error'); }
}

init();
</script>
{% endblock %}
